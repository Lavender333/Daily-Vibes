const START_DATE = new Date(Date.UTC(2026, 5, 2, 12, 0, 0));
function dayDate(i) {
  const d = new Date(START_DATE);
  d.setUTCDate(d.getUTCDate() + i);
  return d;
}

// ── Full 12-sign zodiac season mapper (uses UTC date) ──
function getZodiacSeason(date) {
  const m = date.getUTCMonth() + 1, d = date.getUTCDate();
  const S = (label, note) => ({ label, note });
  if ((m === 3 && d >= 21) || (m === 4 && d <= 19))  return S("Aries Season ♈", "Bold starts & raw drive");
  if ((m === 4 && d >= 20) || (m === 5 && d <= 20))  return S("Taurus Season ♉", "Grounding & steady building");
  if ((m === 5 && d >= 21) || (m === 6 && d <= 20))  return S("Gemini Season ♊", "Ideas, curiosity & connection");
  if ((m === 6 && d >= 21) || (m === 7 && d <= 22))  return S("Cancer Season ♋", "Emotional depth & roots");
  if ((m === 7 && d >= 23) || (m === 8 && d <= 22))  return S("Leo Season ♌", "Confidence & radiance");
  if ((m === 8 && d >= 23) || (m === 9 && d <= 22))  return S("Virgo Season ♍", "Precision & mastery");
  if ((m === 9 && d >= 23) || (m === 10 && d <= 22)) return S("Libra Season ♎", "Balance, beauty & harmony");
  if ((m === 10 && d >= 23) || (m === 11 && d <= 21))return S("Scorpio Season ♏", "Depth & transformation");
  if ((m === 11 && d >= 22) || (m === 12 && d <= 21))return S("Sagittarius Season ♐", "Freedom & big-picture vision");
  if ((m === 12 && d >= 22) || (m === 1 && d <= 19)) return S("Capricorn Season ♑", "Ambition & the long climb");
  if ((m === 1 && d >= 20) || (m === 2 && d <= 18))  return S("Aquarius Season ♒", "Originality & the future");
  return S("Pisces Season ♓", "Imagination & compassion");
}

// ── Dynamic age on a given date (no frozen year) ──
function ageOn(birthYear, birthMonth, birthDay, date) {
  const y = date.getUTCFullYear();
  let age = y - birthYear;
  const bdayPassed = (date.getUTCMonth() > birthMonth) ||
    (date.getUTCMonth() === birthMonth && date.getUTCDate() >= birthDay);
  if (!bdayPassed) age -= 1;
  return age;
}

function getDecan(date) {
  const equinox = new Date(2026, 2, 20); // ~0° Aries, Mar 20 2026
  const days = (date - equinox) / 86400000;

function insightToSecondPerson(text) {

    .replace(/\bHe's\b/g, "You're").replace(/\bhe's\b/g, "you're")

    .replace(/\bHe'll\b/g, "You'll").replace(/\bhe'll\b/g, "you'll")

    .replace(/\bHe isn't\b/g, "You aren't").replace(/\bhe isn't\b/g, "you aren't")

    .replace(/\bHe\b/g, "You").replace(/\bhe\b/g, "you");
}

    const FALLBACK = { M: "visionary", F: "cosmic_mentor", G: "dreamer", B: "brave_heart" };

    let archKey  = getArchetype(profile, lunar, element, mayan, astroEvent, venusDay, saturnDay);

    const archData = ARCHETYPES[profile][archKey];
    const INSIGHT_POOLS = { M: M_INSIGHTS_POOL, F: F_INSIGHTS_POOL, G: G_INSIGHTS_POOL, B: B_INSIGHTS_POOL };
    const insightPool = INSIGHT_POOLS[profile][archKey] || INSIGHT_POOLS[profile][FALLBACK[profile]];
    const ic = insightCount[archKey] || 0;
    insightCount[archKey] = ic + 1;
    const insight  = insightPool[ic % insightPool.length];
    const pool     = POOLS[profile];
    const affPool  = pool[archKey] || pool[FALLBACK[profile]];
    // In-order rotation: each archetype cycles through ALL its affirmations before repeating any

    const primary  = { text: affPool[pc % affPool.length], joke: jokeBank[i % jokeBank.length] };

    // ── ALT = a deliberately CONTRASTING voice (opposite emotional register) ──
    const VOICE_GROUPS = {

    const groups = VOICE_GROUPS[profile];

    const altArch = ARCHETYPES[profile][altKey];

              </div>
              <p style={{ fontSize: "14px", lineHeight: "1.82", margin: "0 0 12px", color: idx === 0 ? "#f0e8d8" : "#ddd5ec" }}>{data.text}</p>
              <div style={{ borderTop: "1px solid rgba(255,255,255,0.07)", paddingTop: "10px" }}>
                <div style={{ fontSize: "8px", letterSpacing: "2px", textTransform: "uppercase", color: "rgba(237,229,216,0.22)", marginBottom: "5px" }}>😂 Follow Up</div>
                <div style={{ display: "flex", gap: "8px", alignItems: "flex-start" }}>
                  <p style={{ fontSize: "12px", lineHeight: "1.6", margin: 0, color: "rgba(237,229,216,0.55)", fontStyle: "italic", flex: 1 }}>{data.joke}</p>
                  <button onClick={() => copy(data.joke, jokeKey)} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.09)", color: copied === jokeKey ? voiceColor : "rgba(237,229,216,0.32)", fontSize: "9px", padding: "3px 7px", borderRadius: "4px", cursor: "pointer", whiteSpace: "nowrap" }}>
                    {copied === jokeKey ? "✓" : "COPY"}
                  </button>
                </div>
              </div>
            </div>
          ))}

          {/* Note */}
          <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: "10px", padding: "12px", marginBottom: "12px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ fontSize: "8px", letterSpacing: "3px", textTransform: "uppercase", color: "rgba(237,229,216,0.22)" }}>📝 Your Note</div>
              <button onClick={() => { setEditNote(!editNote); setNoteInput(pNotes[selected] || ""); }} style={{ background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.09)", color: "rgba(237,229,216,0.38)", fontSize: "9px", padding: "4px 8px", borderRadius: "4px", cursor: "pointer" }}>
                {editNote ? "CANCEL" : pNotes[selected] ? "EDIT" : "+ ADD"}
              </button>
            </div>
            {!editNote && pNotes[selected] && <p style={{ fontSize: "11px", color: "rgba(237,229,216,0.42)", margin: "8px 0 0", fontStyle: "italic" }}>{pNotes[selected]}</p>}
            {editNote && (
              <div style={{ marginTop: "10px" }}>
                <textarea value={noteInput} onChange={e => setNoteInput(e.target.value)} placeholder="What's going on with them today?" style={{ width: "100%", background: "rgba(255,255,255,0.05)", border: `1px solid ${P.border}`, borderRadius: "6px", color: "#ede5d8", fontSize: "12px", padding: "8px", resize: "vertical", minHeight: "52px", fontFamily: "inherit", boxSizing: "border-box" }} />
                <button onClick={saveNote} style={{ marginTop: "7px", background: P.soft, border: `1px solid ${P.border}`, color: P.accent, fontSize: "9px", letterSpacing: "2px", padding: "6px 14px", borderRadius: "4px", cursor: "pointer" }}>SAVE</button>
              </div>
            )}
          </div>

          {/* Month Jump */}
          <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: "8px", padding: "10px" }}>
            <div style={{ fontSize: "8px", letterSpacing: "3px", color: "rgba(237,229,216,0.2)", textTransform: "uppercase", marginBottom: "7px" }}>Jump to Month</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: "4px" }}>
              {(() => {
                // first day-index of each distinct month
                const seen = {}; const buttons = [];
                DAYS.forEach((d, i) => {
                  const key = `${d.date.getFullYear()}-${d.date.getMonth()}`;
                  if (!(key in seen)) { seen[key] = i; buttons.push({ key, i, label: `${MONTHS[d.date.getMonth()]} ${String(d.date.getFullYear()).slice(2)}` }); }
                });
                const curKey = `${cur.date.getFullYear()}-${cur.date.getMonth()}`;
                return buttons.map(({ key, i, label }) => (
                  <button key={key} onClick={() => { setSelected(i); setShowWhy(false); setEditNote(false); }} style={{
                    padding: "5px 8px",
                    background: curKey === key ? P.soft : "rgba(255,255,255,0.03)",
                    border: `1px solid ${curKey === key ? P.border : "rgba(255,255,255,0.06)"}`,
                    color: curKey === key ? P.accent : "rgba(237,229,216,0.32)",
                    borderRadius: "4px", fontSize: "10px", cursor: "pointer",
                  }}>{label}</button>
                ));
              })()}
            </div>
          </div>
        </div>
      )}

      {/* ─── TOGETHER VIEW ─── */}
      {view === "together" && (() => {
        const dayM = DAYS_M[selected];
        const dayF = DAYS_F[selected];
        const vibe = getVibe(dayM, dayF);
        const dailyGuidance = getDailyTogetherGuidance(dayM, dayF, vibe, selected);
        const dating = getDatingInsight(dayM, dayF, vibe);
        const herDating = getHerDatingInsight(dayM, dayF, vibe);
        const stars = [1,2,3,4,5].map(n => n <= vibe.score ? vibe.color : "rgba(237,229,216,0.12)");
        const copyKey = `together-${selected}`;
        const datingCopyKey = `dating-${selected}`;
        const herDatingCopyKey = `her-dating-${selected}`;
        const togetherText = `${dayM.primary.text}\n\n${dayF.primary.text}\n\n${dailyGuidance}`;
        const datingText = `UNDERSTANDING HIM TODAY\n\nHOW HE MAY BE SHOWING UP\n${dating.showing}\n\nWHAT MAY BE UNDERNEATH IT\n${dating.underneath}\n\nWHAT HE MAY NEED FROM YOU\n${dating.need}\n\nWHAT NOT TO ASSUME\n${dating.notAssume}\n\nHOW TO APPROACH HIM\n${dating.approach}\n\nCONVERSATION OPENER\n“${dating.opener}”\n\nDATING ENERGY TODAY\n${dating.datingEnergy}\n\nYOUR GROUNDING REMINDER\n${dating.grounding}`;
        const herDatingText = `UNDERSTANDING HER TODAY\n\nHOW SHE MAY BE SHOWING UP\n${herDating.showing}\n\nWHAT MAY BE UNDERNEATH IT\n${herDating.underneath}\n\nWHAT SHE MAY NEED FROM YOU\n${herDating.need}\n\nWHAT NOT TO ASSUME\n${herDating.notAssume}\n\nHOW TO APPROACH HER\n${herDating.approach}\n\nCONVERSATION OPENER\n“${herDating.opener}”\n\nDATING ENERGY TODAY\n${herDating.datingEnergy}\n\nYOUR GROUNDING REMINDER\n${herDating.grounding}`;
        return (
          <div style={{ padding: "14px 12px 80px" }}>
            {/* Date header */}
            <div style={{ textAlign: "center", marginBottom: "16px" }}>
              <div style={{ fontSize: "9px", letterSpacing: "3px", textTransform: "uppercase", color: "rgba(237,229,216,0.3)" }}>
                {DOW[dayM.date.getUTCDay()]} · {MONTHS[dayM.date.getUTCMonth()]} {dayM.date.getUTCDate()}, {dayM.date.getUTCFullYear()}
              </div>
              <div style={{ fontSize: "9px", letterSpacing: "2px", color: "rgba(237,229,216,0.2)", marginTop: "3px" }}>
                Day {selected + 1} of 365
              </div>
            </div>

            {/* Vibe Score Card */}
            <div style={{ background: `${vibe.color}15`, border: `1px solid ${vibe.color}40`, borderRadius: "14px", padding: "20px 16px", marginBottom: "14px", textAlign: "center" }}>
              <div style={{ fontSize: "32px", marginBottom: "8px" }}>{vibe.icon}</div>
              <div style={{ fontSize: "16px", color: vibe.color, fontWeight: "bold", letterSpacing: "1px", marginBottom: "8px" }}>{vibe.label}</div>
              <div style={{ display: "flex", justifyContent: "center", gap: "5px", marginBottom: "12px" }}>
                {stars.map((col, i) => <span key={i} style={{ fontSize: "14px", color: col }}>★</span>)}
              </div>
              <p style={{ fontSize: "13px", lineHeight: "1.7", color: "rgba(237,229,216,0.75)", margin: "0 0 12px" }}>{vibe.read}</p>
              <div style={{ borderTop: `1px solid ${vibe.color}30`, paddingTop: "12px" }}>
                <div style={{ fontSize: "8px", letterSpacing: "2px", textTransform: "uppercase", color: `${vibe.color}80`, marginBottom: "6px" }}>Today’s guidance</div>
                <p style={{ fontSize: "12px", lineHeight: "1.65", color: "rgba(237,229,216,0.6)", margin: 0, fontStyle: "italic" }}>{dailyGuidance}</p>
              </div>
            </div>

            {/* Side by side voices */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "14px" }}>
              {/* Him */}
              <div style={{ background: "rgba(212,168,67,0.08)", border: "1px solid rgba(212,168,67,0.25)", borderRadius: "10px", padding: "12px" }}>
                <div style={{ fontSize: "8px", letterSpacing: "2px", color: "#D4A843", textTransform: "uppercase", marginBottom: "6px" }}>Him · Jan 21</div>
                <div style={{ fontSize: "12px", color: dayM.archData.color, marginBottom: "6px" }}>{dayM.archData.icon} {dayM.archData.label}</div>
                <p style={{ fontSize: "11px", lineHeight: "1.6", color: "rgba(237,229,216,0.65)", margin: 0 }}>{dayM.primary.text}</p>
              </div>
              {/* Her */}
              <div style={{ background: "rgba(155,126,200,0.08)", border: "1px solid rgba(155,126,200,0.25)", borderRadius: "10px", padding: "12px" }}>
                <div style={{ fontSize: "8px", letterSpacing: "2px", color: "#9B7EC8", textTransform: "uppercase", marginBottom: "6px" }}>Her · Feb 11</div>
                <div style={{ fontSize: "12px", color: dayF.archData.color, marginBottom: "6px" }}>{dayF.archData.icon} {dayF.archData.label}</div>
                <p style={{ fontSize: "11px", lineHeight: "1.6", color: "rgba(237,229,216,0.65)", margin: 0 }}>{dayF.primary.text}</p>
              </div>
            </div>

            {/* Shared sky */}
            <div style={{ background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: "10px", padding: "12px", marginBottom: "14px" }}>
              <div style={{ fontSize: "8px", letterSpacing: "2px", textTransform: "uppercase", color: "rgba(237,229,216,0.28)", marginBottom: "10px" }}>Shared Sky Today</div>
              {[
                { label: dayM.lunar.label, note: "Same moon for both — " + dayM.lunar.noteF, icon: "🌙", color: "#9B7EC8" },
                { label: dayM.sunSign, note: dayM.seasonNote, icon: "☀️", color: "#C9A96E" },
                ...(dayM.astroEvent ? [{ label: dayM.astroEvent.labelF || dayM.astroEvent.labelM, note: dayM.astroEvent.noteF || "", icon: dayM.astroEvent.icon, color: dayM.astroEvent.color }] : []),
              ].map(({ label, note, icon, color }) => (
                <div key={label} style={{ display: "flex", gap: "8px", alignItems: "flex-start", marginBottom: "8px" }}>
                  <span style={{ fontSize: "13px" }}>{icon}</span>
                  <div>
                    <div style={{ fontSize: "10px", color }}>{label}</div>
                    <div style={{ fontSize: "10px", color: "rgba(237,229,216,0.38)", marginTop: "1px" }}>{note}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* Copy button */}
            <button onClick={() => copy(togetherText, copyKey)} style={{ width: "100%", padding: "11px", background: `${vibe.color}18`, border: `1px solid ${vibe.color}40`, color: copied === copyKey ? vibe.color : "rgba(237,229,216,0.5)", borderRadius: "8px", fontSize: "10px", letterSpacing: "2px", textTransform: "uppercase", cursor: "pointer" }}>
              {copied === copyKey ? "✓ Copied" : "Copy Both Affirmations + Move"}
            </button>

            {/* Day nav */}
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: "14px" }}>
              <button onClick={() => nav(-1)} disabled={selected===0} style={{ padding: "8px 18px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "rgba(237,229,216,0.4)", borderRadius: "6px", fontSize: "11px", cursor: "pointer" }}>← Prev</button>
              <button onClick={() => nav(1)}  disabled={selected===364} style={{ padding: "8px 18px", background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)", color: "rgba(237,229,216,0.4)", borderRadius: "6px", fontSize: "11px", cursor: "pointer" }}>Next →</button>
            </div>

            {/* Dating insight for her about him */}
            <div style={{ background: "rgba(212,168,67,0.07)", border: "1px solid rgba(212,168,67,0.3)", borderRadius: "12px", padding: "14px", marginTop: "14px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "10px", marginBottom: "12px" }}>
                <div style={{ fontSize: "9px", letterSpacing: "2px", textTransform: "uppercase", color: "rgba(212,168,67,0.9)" }}>💛 Understanding Him Today</div>
                <button onClick={() => copy(datingText, datingCopyKey)} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(212,168,67,0.35)", color: copied === datingCopyKey ? "#D4A843" : "rgba(237,229,216,0.46)", fontSize: "9px", padding: "5px 8px", borderRadius: "4px", cursor: "pointer" }}>{copied === datingCopyKey ? "✓ COPIED" : "COPY"}</button>
              </div>
              {[
                ["How He May Be Showing Up", "🧭", dating.showing],
                ["What May Be Underneath It", "🌊", dating.underneath],
                ["What He May Need From You", "🌱", dating.need],
                ["What Not to Assume", "🕊️", dating.notAssume],
                ["How to Approach Him", "🤝", dating.approach],
                ["Conversation Opener", "💬", `“${dating.opener}”`],
                ["Dating Energy Today", "💞", dating.datingEnergy],
                ["Your Grounding Reminder", "⚓", dating.grounding],
              ].map(([label, icon, text]) => (
                <div key={label} style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: "9px", marginTop: "9px" }}>
                  <div style={{ fontSize: "8px", letterSpacing: "1.5px", textTransform: "uppercase", color: "rgba(212,168,67,0.67)", marginBottom: "4px" }}>{icon} {label}</div>
                  <div style={{ fontSize: "12px", lineHeight: "1.68", color: "rgba(237,229,216,0.7)" }}>{text}</div>
                </div>
              ))}
              <div style={{ fontSize: "9px", color: "rgba(237,229,216,0.28)", fontStyle: "italic", lineHeight: "1.5", borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: "9px", marginTop: "10px" }}>
                Reflective dating guidance—not proof of exactly what he is thinking or feeling.
              </div>
            </div>

            {/* Dating insight for him about her */}
            <div style={{ background: "rgba(155,126,200,0.08)", border: "1px solid rgba(155,126,200,0.34)", borderRadius: "12px", padding: "14px", marginTop: "14px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: "10px", marginBottom: "12px" }}>
                <div style={{ fontSize: "9px", letterSpacing: "2px", textTransform: "uppercase", color: "rgba(212,160,192,0.92)" }}>💜 Understanding Her Today</div>
                <button onClick={() => copy(herDatingText, herDatingCopyKey)} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(155,126,200,0.4)", color: copied === herDatingCopyKey ? "#D4A0C0" : "rgba(237,229,216,0.46)", fontSize: "9px", padding: "5px 8px", borderRadius: "4px", cursor: "pointer" }}>{copied === herDatingCopyKey ? "✓ COPIED" : "COPY"}</button>
              </div>
              {[
                ["How She May Be Showing Up", "🧭", herDating.showing],
                ["What May Be Underneath It", "🌊", herDating.underneath],
                ["What She May Need From You", "🌱", herDating.need],
                ["What Not to Assume", "🕊️", herDating.notAssume],
                ["How to Approach Her", "🤝", herDating.approach],
                ["Conversation Opener", "💬", `“${herDating.opener}”`],
                ["Dating Energy Today", "💞", herDating.datingEnergy],
                ["Your Grounding Reminder", "⚓", herDating.grounding],
              ].map(([label, icon, text]) => (
                <div key={label} style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: "9px", marginTop: "9px" }}>
                  <div style={{ fontSize: "8px", letterSpacing: "1.5px", textTransform: "uppercase", color: "rgba(212,160,192,0.7)", marginBottom: "4px" }}>{icon} {label}</div>
                  <div style={{ fontSize: "12px", lineHeight: "1.68", color: "rgba(237,229,216,0.7)" }}>{text}</div>
                </div>
              ))}
              <div style={{ fontSize: "9px", color: "rgba(237,229,216,0.28)", fontStyle: "italic", lineHeight: "1.5", borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: "9px", marginTop: "10px" }}>
                Reflective dating guidance—not proof of exactly what she is thinking or feeling.
              </div>
            </div>
          </div>
        );
      })()}

      {/* ─── FAVORITES ─── */}
      {view === "favorites" && (
        <div style={{ padding: "14px 12px 60px" }}>
          <div style={{ fontSize: "9px", letterSpacing: "3px", textTransform: "uppercase", color: "rgba(237,229,216,0.28)", marginBottom: "14px" }}>Saved · {P.label}</div>
          {favList.length === 0 ? (
            <div style={{ textAlign: "center", padding: "40px 20px", color: "rgba(237,229,216,0.22)", fontSize: "13px" }}>
              <div style={{ fontSize: "26px", marginBottom: "10px" }}>🖤</div>
              No favorites yet — tap 🖤 on any affirmation to save it here.
            </div>
          ) : favList.map(key => {
            const match = key.match(/^(primary|alt)-(\d+)$/);
            if (!match) return null;
            const [, type, idx] = match;
            const i   = parseInt(idx);
            const d   = DAYS[i];
            const text = type === "primary" ? d.primary.text : d.alt.text;
            const ck   = `fc-${key}`;
            return (
              <div key={key} style={{ background: `${d.archData.color}12`, border: `1px solid ${d.archData.color}30`, borderRadius: "10px", padding: "14px", marginBottom: "9px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "8px" }}>
                  <div style={{ fontSize: "9px", color: d.archData.color, letterSpacing: "1px" }}>
                    {d.archData.icon} {d.archData.label} · Day {i+1}{type === "alt" ? " Alt" : ""} · {DOW[d.date.getDay()]} {MONTHS[d.date.getMonth()]} {d.date.getDate()}
                  </div>
                  <div style={{ display: "flex", gap: "5px" }}>
                    <button onClick={() => copy(text, ck)} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)", color: copied === ck ? d.archData.color : "rgba(237,229,216,0.38)", fontSize: "9px", padding: "3px 7px", borderRadius: "4px", cursor: "pointer" }}>{copied === ck ? "✓" : "COPY"}</button>
                    <button onClick={() => toggleFav(key)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: "12px" }}>🖤</button>
                  </div>
                </div>
                <p style={{ fontSize: "13px", lineHeight: "1.75", margin: 0, color: "#ede5d8" }}>{text}</p>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
